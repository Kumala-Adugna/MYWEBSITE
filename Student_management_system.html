<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bicho Elementary School - Student Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>Bicho Elementary School</h1>
    <p>Student Management Portal</p>
  </header>

  <!-- FORM SECTION -->
  <section class="form-section">
    <h2>Add Student</h2>
    <form id="studentForm">
      <input type="text" id="name" placeholder="Student Name" required>
      <input type="text" id="grade" placeholder="Grade/Class" required>
      <input type="number" id="marks" placeholder="Marks" min="0" max="100" required>
      <button type="button" onclick="addStudent()">Add Student</button>
    </form>
  </section>

  <!-- TABLE SECTION -->
  <section class="table-section">
    <h2>Student List</h2>
    <table id="studentTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Grade</th>
          <th>Marks</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <!-- Students will be added here dynamically -->
      </tbody>
    </table>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 Bicho Elementary School • All Rights Reserved</p>
  </footer>

  <!-- LINK JS -->
  <script src="script.js"></script>
</body>
</html>
